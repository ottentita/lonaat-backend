<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lonaat - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1f77b4 0%, #2c3e50 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 16px;
        }
        p {
            font-size: 18px;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Lonaat</h1>
        <p>AI-Powered Affiliate Marketing Dashboard</p>
        <div class="links">
            <a href="/admin">🔐 Admin Panel</a>
            <a href="/dashboard">📊 User Dashboard</a>
            <a href="/withdraw_page">💰 Withdrawal Page</a>
            <a href="/affiliate">🎯 Affiliate Marketing</a>
        </div>
        <p style="margin-top: 40px; font-size: 14px; opacity: 0.7;">
            Complete affiliate marketing platform with AI-powered features
        </p>
        
        <div id="marketplace" style="margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);">
            <p>Loading marketplace products...</p>
        </div>
    </div>
    
    <script>
        async function loadMarketplace() {
            const res = await fetch('/sync_affiliates', {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({clickbank_key:"YOUR_CLICKBANK_KEY"})
            });
            const data = await res.json();
            console.log(data.message);

            // Now fetch latest products from Firebase (optional)
            // For demo, just show placeholder
            document.getElementById("marketplace").innerHTML = `
                <p>Products synced! Check Firebase → marketplace.</p>
            `;
        }
        loadMarketplace();
    </script>
</body>
</html>
