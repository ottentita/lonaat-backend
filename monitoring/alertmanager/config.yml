global:
  resolve_timeout: 5m

route:
  receiver: 'composite'
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: 'email'
    email_configs:
      - to: 'alerts@example.com'
        from: 'alertmanager@example.com'
        smarthost: 'mailhog:1025'
        send_resolved: true

  - name: 'webhook'
    webhook_configs:
      - url: 'http://webhook-receiver:5001/'
        send_resolved: true

  - name: 'composite'
    # composite forwards to both email and webhook
    webhook_configs:
      - url: 'http://webhook-receiver:5001/'
        send_resolved: true
    email_configs:
      - to: 'alerts@example.com'
        from: 'alertmanager@example.com'
        smarthost: 'mailhog:1025'
        send_resolved: true

# NOTE: For production, replace MailHog with a real SMTP smarthost and
# use real `to` addresses. `alerts@example.com` is a placeholder for testing.
