global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: 'phase9-worker'
    static_configs:
      - targets: ['phase9-worker:8000']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
