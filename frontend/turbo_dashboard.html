<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LONAAT – Affiliate Marketing Turbo Mode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0f172a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container { padding: 1rem; }
    h1 {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    @media (min-width: 768px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
    }
    .card {
      background-color: #1e293b;
      padding: 1rem;
      border-radius: 0.375rem;
    }
    .card h2 {
      font-size: 1.25rem;
      font-weight: bold;
    }
    .settings {
      margin-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    input[type="checkbox"] {
      accent-color: #16a34a;
      width: 1rem;
      height: 1rem;
    }
    .btn {
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      border: none;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-green {
      background-color: #16a34a;
      color: white;
      margin-top: 1rem;
    }
    .btn-green:hover { background-color: #15803d; }
    .btn-blue {
      background-color: #2563eb;
      color: white;
    }
    .btn-blue:hover { background-color: #1d4ed8; }
    .actions {
      margin-top: 2rem;
    }
    .status {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      opacity: 0.7;
    }
  </style>
  <script src="https://unpkg.com/alpinejs" defer></script>
</head>
<body x-data="affiliateDashboard()">
  <div class="container">
    <h1>🚀 LONAAT – Affiliate Marketing Turbo Mode</h1>

    <div class="grid">
      <div class="card">
        <p>Product Limit</p>
        <h2 x-text="stats.product_limit"></h2>
      </div>
      <div class="card">
        <p>Traffic Boost</p>
        <h2 x-text="stats.traffic_boost + '%'"></h2>
      </div>
      <div class="card">
        <p>Content Speed</p>
        <h2 x-text="stats.content_speed"></h2>
      </div>
      <div class="card">
        <p>Active Platforms</p>
        <h2 x-text="stats.active_platforms"></h2>
      </div>
    </div>

    <div class="settings">
      <label class="label">
        <input type="checkbox" x-model="settings.ai_enabled">
        <span>AI Content Enabled</span>
      </label>

      <label class="label">
        <input type="checkbox" x-model="settings.auto_schedule">
        <span>Auto Schedule</span>
      </label>

      <button @click="saveSettings" class="btn btn-green">Save Settings</button>
    </div>

    <div class="actions">
      <button @click="transferProducts" class="btn btn-blue">Transfer All Products</button>
      <p class="status" x-text="status"></p>
    </div>
  </div>

<script>
const API = window.location.hostname.includes('onrender.com') ? 'https://lonaat-backend.onrender.com' : '';
function affiliateDashboard(){
  return {
    user_id: localStorage.getItem("user_id") || "demo_user",
    stats: {product_limit:"∞",traffic_boost:0,content_speed:"-",active_platforms:0},
    settings:{ai_enabled:false,auto_schedule:false},
    status:"",

    async init(){
      const res = await fetch(`${API}/get_affiliate_stats/${this.user_id}`);
      this.stats = await res.json();
      const conf = await fetch(`${API}/get_affiliate_settings/${this.user_id}`);
      this.settings = await conf.json();
    },

    async saveSettings(){
      await fetch(`${API}/update_affiliate_setting`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({user_id:this.user_id,settings:this.settings})
      });
      this.status="✅ Settings saved";
    },

    async transferProducts(){
      this.status="Transferring products...";
      const res = await fetch(`${API}/transfer_products`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({user_id:this.user_id})
      });
      const data = await res.json();
      this.status=data.message || "Done";
    }
  }
}
</script>
</body>
</html>
