<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Commissions - Lonaat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💵 My Commissions</h1>
            <a href="index.html" class="back-link">← Back to Marketplace</a>
        </header>

        <section class="user-input">
            <h3>View Your Commission History</h3>
            <input type="text" id="userId" placeholder="Enter your User ID (e.g., user123)" />
            <button onclick="loadCommissions()" class="btn-primary">Load My Commissions</button>
        </section>

        <section id="commissionsContent" class="commissions-content" style="display: none;">
            <div class="balance-summary">
                <h2>Current Balance: <span id="balance" class="balance-amount">₦0.00</span></h2>
                <a href="bank_payment.html" class="btn-secondary">Request Payout</a>
            </div>

            <div class="transactions-table">
                <h3>Transaction History</h3>
                <div id="transactionsContainer">
                    <p class="loading">Loading transactions...</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        const BACKEND_URL = 'https://lonaat-backend.onrender.com';

        async function loadCommissions() {
            const userId = document.getElementById('userId').value.trim();
            
            if (!userId) {
                alert('Please enter your User ID');
                return;
            }

            try {
                const response = await fetch(`${BACKEND_URL}/get_user_commissions/${userId}`);
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                // Show commissions content
                document.getElementById('commissionsContent').style.display = 'block';

                // Update balance
                document.getElementById('balance').textContent = `₦${data.balance.toFixed(2)}`;

                // Display transactions
                const container = document.getElementById('transactionsContainer');
                
                if (data.transactions.length === 0) {
                    container.innerHTML = '<p class="no-data">No transactions yet. Start earning commissions!</p>';
                    return;
                }

                const transactionsHtml = `
                    <table class="transactions-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.transactions.map(tx => `
                                <tr class="tx-${tx.type}">
                                    <td>${new Date(tx.timestamp).toLocaleDateString()}</td>
                                    <td>
                                        <span class="tx-type ${tx.type}">
                                            ${tx.type === 'commission' ? '💰' : tx.type === 'withdrawal' ? '💸' : '➕'} 
                                            ${tx.type.charAt(0).toUpperCase() + tx.type.slice(1)}
                                        </span>
                                    </td>
                                    <td class="amount ${tx.type === 'withdrawal' ? 'negative' : 'positive'}">
                                        ${tx.type === 'withdrawal' ? '-' : '+'}₦${parseFloat(tx.amount).toFixed(2)}
                                    </td>
                                    <td>
                                        <span class="status ${tx.status}">
                                            ${tx.status === 'paid' ? '✅' : '⏳'} 
                                            ${tx.status.charAt(0).toUpperCase() + tx.status.slice(1)}
                                        </span>
                                    </td>
                                    <td>${tx.description || '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

                container.innerHTML = transactionsHtml;

            } catch (error) {
                console.error('Error loading commissions:', error);
                alert('Unable to load commissions. Please try again.');
            }
        }

        // Auto-load if userId in URL
        const urlParams = new URLSearchParams(window.location.search);
        const userIdParam = urlParams.get('userId');
        if (userIdParam) {
            document.getElementById('userId').value = userIdParam;
            loadCommissions();
        }
    </script>
</body>
</html>
