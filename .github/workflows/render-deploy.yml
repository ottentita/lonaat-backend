name: Render Auto-Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/**'
  workflow_dispatch:

jobs:
  pre-deploy-checks:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyyaml
      
      - name: Validate deployment configuration
        run: |
          echo "🔍 Validating deployment files..."
          
          # Check render.yaml
          if [ ! -f "render.yaml" ]; then
            echo "❌ render.yaml not found!"
            exit 1
          fi
          python -c "import yaml; config=yaml.safe_load(open('render.yaml')); print('✅ render.yaml valid')"
          
          # Check requirements.txt
          if [ ! -f "requirements.txt" ]; then
            echo "❌ requirements.txt not found!"
            exit 1
          fi
          
          # Verify gunicorn is in requirements
          if ! grep -q "gunicorn" requirements.txt; then
            echo "❌ gunicorn not in requirements.txt!"
            exit 1
          fi
          echo "✅ gunicorn found in requirements.txt"
          
          # Check main.py exists
          if [ ! -f "main.py" ]; then
            echo "❌ main.py not found!"
            exit 1
          fi
          echo "✅ main.py exists"
      
      - name: Security pre-check
        run: |
          echo "🔒 Running security checks..."
          
          # No API keys in code
          if grep -r "sk-[a-zA-Z0-9]\{48\}" --exclude-dir=.git --exclude-dir=.github . 2>/dev/null; then
            echo "❌ Found API keys in code!"
            exit 1
          fi
          
          # No Firebase keys in code
          if grep -r "AIza[0-9A-Za-z-_]\{35\}" --exclude-dir=.git --exclude-dir=.github . 2>/dev/null; then
            echo "❌ Found Firebase keys in code!"
            exit 1
          fi
          
          echo "✅ No secrets in code"
      
      - name: Test Python syntax
        run: |
          echo "🐍 Checking Python syntax..."
          python -m py_compile main.py
          python -m py_compile affiliate_integration.py
          echo "✅ Python syntax valid"
      
      - name: Deployment ready
        run: |
          echo "=================================="
          echo "✅ PRE-DEPLOYMENT CHECKS PASSED"
          echo "=================================="
          echo ""
          echo "🚀 Render will automatically deploy this commit"
          echo "📊 Monitor at: https://dashboard.render.com"
          echo ""
          echo "⚠️  Remember to set environment variables in Render:"
          echo "  - ADMIN_USERNAME"
          echo "  - ADMIN_PASSWORD"
          echo "  - ENCRYPTION_KEY"
          echo "  - FIREBASE_SERVICE_ACCOUNT"
          echo "  - FIREBASE_DATABASE_URL"
          echo "  - FLASK_SECRET"

  post-deploy-notification:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: success()
    
    steps:
      - name: Success notification
        run: |
          echo "✅ All pre-deployment checks passed!"
          echo "🎉 Code is ready for production"
          echo "🔗 Render will deploy automatically"
