name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run security checks
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r "sk-[a-zA-Z0-9]\{48\}" --exclude-dir=.git --exclude-dir=.github .; then
            echo "❌ Found potential API keys in code!"
            exit 1
          fi
          if grep -r "AIza[0-9A-Za-z-_]\{35\}" --exclude-dir=.git --exclude-dir=.github .; then
            echo "❌ Found potential Firebase API keys in code!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"
      
      - name: Validate configuration files
        run: |
          echo "Validating render.yaml..."
          python -c "import yaml; yaml.safe_load(open('render.yaml'))"
          echo "✅ render.yaml is valid"
          
          echo "Validating firebase_rules.json..."
          python -c "import json; json.load(open('firebase_rules.json'))"
          echo "✅ firebase_rules.json is valid"
      
      - name: Check required files
        run: |
          required_files=(
            "main.py"
            "requirements.txt"
            "render.yaml"
            "firebase_rules.json"
            "affiliate_integration.py"
          )
          
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing required file: $file"
              exit 1
            fi
          done
          echo "✅ All required files present"

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: test
    if: success()
    
    steps:
      - name: Deployment ready
        run: |
          echo "✅ All tests passed!"
          echo "🚀 Ready for deployment to Render"
          echo ""
          echo "Render will automatically deploy from this branch."
          echo "Monitor deployment at: https://dashboard.render.com"
