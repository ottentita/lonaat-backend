name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit
      
      - name: Check dependencies for vulnerabilities
        run: |
          echo "🔍 Checking dependencies for known vulnerabilities..."
          pip install -r requirements.txt
          safety check --json || echo "⚠️ Some vulnerabilities found"
        continue-on-error: true
      
      - name: Run Bandit security linter
        run: |
          echo "🔍 Running Bandit security analysis..."
          bandit -r . -f json -o bandit-report.json || echo "⚠️ Security issues found"
          if [ -f bandit-report.json ]; then
            echo "Bandit report generated"
          fi
        continue-on-error: true
      
      - name: Check for exposed secrets
        run: |
          echo "🔍 Scanning for exposed secrets..."
          
          # OpenAI keys
          if grep -r "sk-[a-zA-Z0-9]\{48\}" --exclude-dir=.git --exclude-dir=.github .; then
            echo "❌ Found potential OpenAI API keys!"
            exit 1
          fi
          
          # Firebase keys
          if grep -r "AIza[0-9A-Za-z-_]\{35\}" --exclude-dir=.git --exclude-dir=.github .; then
            echo "❌ Found potential Firebase API keys!"
            exit 1
          fi
          
          # AWS keys
          if grep -r "AKIA[0-9A-Z]\{16\}" --exclude-dir=.git --exclude-dir=.github .; then
            echo "❌ Found potential AWS keys!"
            exit 1
          fi
          
          # Generic secrets
          if grep -rn "password.*=.*['\"][^'\"]\{8,\}['\"]" --exclude-dir=.git --exclude-dir=templates .; then
            echo "⚠️ Found potential hardcoded passwords"
          fi
          
          echo "✅ No exposed secrets detected"
      
      - name: Security summary
        run: |
          echo "================================"
          echo "🔒 Security Scan Complete"
          echo "================================"
          echo "Timestamp: $(date)"
          echo "Check the logs above for any issues"
