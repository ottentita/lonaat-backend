version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: lonaat-test-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: lonaat_test
    volumes:
      - pgdata_test:/var/lib/postgresql/data

volumes:
  pgdata_test:
