services:
  # Backend API Service
  - type: web
    name: lonaat-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MANUAL_PRODUCTS_ONLY
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: lonaat-db
          property: connectionString
      - key: PORT
        value: 4000
      # These will be added manually in Render dashboard
      # - key: WEBHOOK_SECRET
      # - key: JWT_SECRET
      # - key: SYSTEM_SECRET
      # - key: OPENAI_API_KEY

databases:
  - name: lonaat-db
    databaseName: lonaat
    user: lonaat
    plan: free
    region: oregon
