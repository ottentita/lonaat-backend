<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lonaat - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1f77b4 0%, #2c3e50 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 30px;
            text-align: center;
        }
        .panel {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #2ecc71;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            font-size: 16px;
        }
        input {
            background: rgba(255,255,255,0.9);
            color: #2c3e50;
        }
        button {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }
        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        .back-link:hover {
            opacity: 1;
        }
        #message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            display: none;
        }
        .success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
        }
        .error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Home</a>
        <h1>🔐 Admin Panel</h1>
        
        <div class="panel">
            <h2>Register New User</h2>
            <input type="text" id="userId" placeholder="User ID">
            <input type="text" id="userName" placeholder="Full Name">
            <input type="email" id="userEmail" placeholder="Email">
            <input type="text" id="bankAccount" placeholder="Bank Account Number">
            <button onclick="registerUser()">Register User</button>
            <div id="registerMessage"></div>
        </div>
        
        <div class="panel">
            <h2>Add Commission</h2>
            <input type="text" id="commUserId" placeholder="User ID">
            <input type="number" id="commAmount" placeholder="Amount (₦)">
            <button onclick="addCommission()">Add Commission</button>
            <div id="commMessage"></div>
        </div>
        
        <div class="panel">
            <h2>Process Withdrawal</h2>
            <input type="text" id="withdrawUserId" placeholder="User ID">
            <input type="number" id="withdrawAmount" placeholder="Amount (₦)">
            <button onclick="processWithdrawal()">Process Withdrawal</button>
            <div id="withdrawMessage"></div>
        </div>
        
        <div class="panel">
            <h2>📊 Firebase Data Viewer</h2>
            <div style="margin-bottom:15px;">
                <strong id="dbStatus">Database Status</strong><br>
                Users: <span id="statsUsers">0</span> | 
                Transactions: <span id="statsTransactions">0</span> | 
                Products: <span id="statsProducts">0</span>
            </div>
            <button onclick="loadFirebaseData()">Load Firebase Data</button>
            <pre id="dataOutput" style="background:rgba(0,0,0,0.3);padding:15px;border-radius:8px;margin-top:15px;overflow-x:auto;max-height:400px;overflow-y:auto;">Click "Load Firebase Data" to view all data</pre>
        </div>
    </div>
    
    <script>
        function showMessage(elementId, message, isSuccess) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = isSuccess ? 'success' : 'error';
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
        
        async function registerUser() {
            const data = {
                user_id: document.getElementById('userId').value,
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                bank_account: document.getElementById('bankAccount').value
            };
            
            const response = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            showMessage('registerMessage', result.message || result.error, !result.error);
        }
        
        async function addCommission() {
            const data = {
                user_id: document.getElementById('commUserId').value,
                amount: document.getElementById('commAmount').value
            };
            
            const response = await fetch('/add_commission', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            showMessage('commMessage', result.message || result.error, !result.error);
        }
        
        async function processWithdrawal() {
            const data = {
                user_id: document.getElementById('withdrawUserId').value,
                amount: document.getElementById('withdrawAmount').value
            };
            
            const response = await fetch('/withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            showMessage('withdrawMessage', result.message || result.error, !result.error);
        }
        
        async function loadFirebaseData() {
            const response = await fetch('/api/admin_data');
            const data = await response.json();
            
            document.getElementById('dataOutput').textContent = JSON.stringify(data, null, 2);
            document.getElementById('dbStatus').textContent = data.firebase_enabled ? '✅ Firebase Connected' : '⚠️ In-Memory Mode';
            document.getElementById('statsUsers').textContent = data.total_users;
            document.getElementById('statsTransactions').textContent = data.total_transactions;
            document.getElementById('statsProducts').textContent = data.total_products;
        }
    </script>
</body>
</html>
