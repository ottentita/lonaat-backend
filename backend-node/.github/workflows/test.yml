name: CI - Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
        working-directory: backend-node
      - name: Generate test Prisma client
        run: npx prisma generate --schema=prisma/schema.test.prisma
        working-directory: backend-node
      - name: Apply migrations to test DB
        run: npx prisma migrate deploy --schema=prisma/schema.test.prisma
        working-directory: backend-node
      - name: Seed test DB
        run: node prisma/seed.test.js
        working-directory: backend-node
      - name: Run tests
        run: npx vitest --run
        working-directory: backend-node
